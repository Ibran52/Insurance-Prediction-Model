<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Insurance Cost Prediction</title><style>body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;}.container{background:white;padding:40px;border-radius:15px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:500px;}h1{color:#333;text-align:center;}label{display:block;margin:15px 0 5px;}input,select{width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:10px;}button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:8px;cursor:pointer;margin-top:20px;}.result{margin-top:30px;padding:20px;background:#f0f4ff;border-radius:10px;display:none;}.result.show{display:block;}.result-value{font-size:32px;font-weight:700;color:#667eea;margin-top:10px;}</style></head><body><div class="container"><h1>Insurance Cost Prediction</h1><form id="form"><label>Age: <span id="ageD">25</span></label><input type="range" id="age" min="18" max="100" value="25"><label>BMI: <span id="bmiD">22</span></label><input type="range" id="bmi" min="10" max="50" step="0.1" value="22"><label>Children</label><input type="number" id="children" value="0"><label>Gender</label><select id="sex"><option>Male</option><option>Female</option></select><label>Smoker</label><select id="smoker"><option>No</option><option>Yes</option></select><label>Region</label><select id="region"><option value="northwest">Northwest</option><option value="northeast">Northeast</option><option value="southeast">Southeast</option><option value="southwest">Southwest</option></select><button type="submit">Predict Cost</button><div class="result" id="result"><div>Annual Cost</div><div class="result-value">$<span id="pred">0</span></div></div></form></div><script>document.getElementById("age").oninput=e=>{document.getElementById("ageD").textContent=e.target.value;};document.getElementById("bmi").oninput=e=>{document.getElementById("bmiD").textContent=parseFloat(e.target.value).toFixed(1);};document.getElementById("form").onsubmit=async e=>{e.preventDefault();const res=await fetch("/api/predict",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({age:parseFloat(document.getElementById("age").value),bmi:parseFloat(document.getElementById("bmi").value),children:parseInt(document.getElementById("children").value),sex:document.getElementById("sex").value,smoker:document.getElementById("smoker").value,region:document.getElementById("region").value})});const data=await res.json();if(data.status==="success"){document.getElementById("pred").textContent=Math.round(data.prediction).toLocaleString();document.getElementById("result").classList.add("show");}};}</script></body></html>
